services:
  - type: web
    name: figurinhas-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: figurinhas-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PHONE
        sync: false   # você define manualmente no dashboard do Render

  - type: static
    name: figurinhas-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://figurinhas-backend.onrender.com

databases:
  - name: figurinhas-db
    databaseName: figurinhas
    user: figurinhas_user
    plan: free
