services:
  - type: web
    name: figurinhas-app
    env: node
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: figurinhas-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PHONE
        sync: false

databases:
  - name: figurinhas-db
    databaseName: figurinhas
    user: figurinhas_user
    plan: free
